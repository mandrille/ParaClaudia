name: Deploy to GitHub Pages

# Pages serves the gh-pages branch (legacy build); this just keeps it in
# sync with main. The Pages API route (configure-pages/deploy-pages) is not
# usable here: GITHUB_TOKEN gets "Resource not accessible by integration".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
